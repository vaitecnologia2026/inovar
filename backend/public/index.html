<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INOVAR — Sistema de Cupons</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/umd/lucide.min.js"></script>
<link rel="shortcut icon" href="/icon-inovar.png" type="image/x-icon">
<style>
:root {
 --brand:#E4202A; --brand-dim:#b8181f; --brand-glow:rgba(228,32,42,.12);
 --dark:#0D0D0D; --surface:#111111; --card:#1C1C1C; --card2:#242424;
 --border:rgba(255,255,255,.08); --text:#F5F5F5; --muted:#888;
 --green:#22c55e; --yellow:#f59e0b; --red:#ef4444; --blue:#3b82f6;
}
body.light {
 --dark:#F2F2F2; --surface:#fff; --card:#fff; --card2:#F2F2F2;
 --border:rgba(0,0,0,.10); --text:#111; --muted:#666;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Montserrat',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;overflow-x:hidden;}
.hidden{display:none!important;}

/* LOGIN */
#screen-login{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0A0A0A,#1a0505 50%,#0A0A0A);position:relative;}
#screen-login::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--brand);}
.login-wrap{width:400px;text-align:center;position:relative;z-index:1;}
.inovar-logo{display:inline-flex;align-items:center;margin-bottom:10px;}
.inovar-logo-text{background:var(--brand);padding:6px 16px 6px 10px;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 50%,calc(100% - 8px) 100%,0 100%);}
.inovar-logo-text span{font-size:28px;font-weight:900;color:#fff;letter-spacing:3px;}
.inovar-sub{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:4px;text-transform:uppercase;margin-bottom:36px;}
.login-form{display:flex;flex-direction:column;gap:12px;}
.field label{display:block;font-size:10px;color:var(--muted);margin-bottom:5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;}
.field input,.field select{width:100%;background:rgba(255,255,255,.05);border:1.5px solid var(--border);border-radius:4px;padding:12px 14px;color:var(--text);font-family:'Montserrat',sans-serif;font-size:13px;transition:.2s;}
.field input:focus,.field select:focus{outline:none;border-color:var(--brand);}
.field select option{background:#1C1C1C;}

/* SHELL */
#shell{display:none;flex-direction:column;min-height:100vh;}
.topbar{background:var(--surface);border-bottom:2px solid var(--brand);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.top-logo-text{background:var(--brand);padding:3px 10px 3px 8px;clip-path:polygon(0 0,calc(100% - 6px) 0,100% 50%,calc(100% - 6px) 100%,0 100%);}
.top-logo-text span{font-size:14px;font-weight:900;color:#fff;letter-spacing:2px;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.bell-btn{position:relative;background:var(--card);border:1px solid var(--border);border-radius:4px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:.15s;}
.bell-btn:hover{border-color:var(--brand);}
.bell-badge{position:absolute;top:-5px;right:-5px;background:var(--brand);color:#fff;border-radius:999px;font-size:9px;font-weight:800;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;padding:0 3px;}
.bell-wrap{position:relative;}
.notif-panel{position:absolute;top:42px;right:0;width:320px;background:var(--card);border:1px solid var(--border);border-radius:8px;box-shadow:0 16px 48px rgba(0,0,0,.5);z-index:500;overflow:hidden;animation:fadeUp .2s ease;}
.notif-item{padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;gap:10px;align-items:flex-start;transition:.12s;font-size:12px;}
.notif-item:hover{background:var(--card2);}
.notif-item:last-child{border-bottom:none;}
.user-pill{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid rgba(228,32,42,.3);border-radius:4px;padding:5px 12px 5px 7px;font-size:12px;}
.user-avatar{width:24px;height:24px;border-radius:50%;background:var(--brand);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;}
.tag{display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700;}
.tag-brand{background:var(--brand-glow);color:var(--brand);}
.tag-green{background:rgba(34,197,94,.12);color:var(--green);}
.tag-yellow{background:rgba(245,158,11,.12);color:var(--yellow);}
.tag-red{background:rgba(239,68,68,.12);color:var(--red);}

/* LAYOUT */
.main{display:flex;flex:1;}
.sidebar{width:215px;background:var(--surface);border-right:1px solid var(--border);border-top:3px solid var(--brand);padding:18px 10px;display:flex;flex-direction:column;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;}
.nav-label{font-size:9px;color:rgba(228,32,42,.7);text-transform:uppercase;letter-spacing:1.5px;padding:0 8px;margin:14px 0 5px;font-weight:800;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:4px;cursor:pointer;font-size:11.5px;font-weight:600;color:var(--muted);transition:.12s;letter-spacing:.2px;}
.nav-item:hover{background:var(--card);color:var(--text);}
.nav-item.active{background:rgba(228,32,42,.12);color:var(--brand);font-weight:800;border-left:3px solid var(--brand);}
.content{flex:1;padding:24px;overflow-y:auto;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:4px;border:none;cursor:pointer;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;transition:.2s;}
.btn-brand{background:var(--brand);color:#fff;}
.btn-brand:hover{background:var(--brand-dim);box-shadow:0 4px 12px rgba(228,32,42,.3);}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--brand);color:var(--brand);}
.btn-sm{padding:5px 12px;font-size:11px;}
.btn-green{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.2);}
.btn-green:hover{background:rgba(34,197,94,.22);}
.btn-red{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.18);}
.btn-red:hover{background:rgba(239,68,68,.2);}

/* CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:18px;position:relative;overflow:hidden;}
.stat-card.orange::before{content:'';position:absolute;top:0;right:0;width:70px;height:70px;border-radius:0 6px 0 70px;background:rgba(228,32,42,.07);}
.stat-card.green::before{content:'';position:absolute;top:0;right:0;width:70px;height:70px;border-radius:0 6px 0 70px;background:rgba(34,197,94,.07);}
.stat-card.yellow::before{content:'';position:absolute;top:0;right:0;width:70px;height:70px;border-radius:0 6px 0 70px;background:rgba(245,158,11,.07);}
.stat-card.blue::before{content:'';position:absolute;top:0;right:0;width:70px;height:70px;border-radius:0 6px 0 70px;background:rgba(59,130,246,.07);}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:700;margin-bottom:5px;}
.stat-value{font-size:30px;font-weight:900;letter-spacing:-1px;}
.stat-card.orange .stat-value{color:var(--brand);}
.stat-card.green .stat-value{color:var(--green);}
.stat-card.yellow .stat-value{color:var(--yellow);}
.stat-card.blue .stat-value{color:var(--blue);}
.stat-sub{font-size:10px;color:var(--muted);margin-top:3px;}

/* TABLE */
.table-wrap{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--brand);border-radius:4px;overflow:hidden;}
table{width:100%;border-collapse:collapse;}
thead th{background:rgba(228,32,42,.07);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;padding:11px 14px;text-align:left;font-weight:700;border-bottom:1px solid rgba(228,32,42,.2);}
tbody tr{border-top:1px solid var(--border);transition:.1s;}
tbody tr:hover{background:var(--card2);}
tbody td{padding:12px 14px;font-size:12.5px;}

/* FORM */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
.filter-bar input,.filter-bar select{background:var(--card);border:1.5px solid var(--border);border-radius:4px;padding:8px 12px;color:var(--text);font-family:'Montserrat',sans-serif;font-size:12px;transition:.2s;}
.filter-bar input:focus,.filter-bar select:focus{outline:none;border-color:var(--brand);}
.filter-bar input{flex:1;min-width:160px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--card);border:1px solid var(--border);border-top:3px solid var(--brand);border-radius:6px;padding:26px;width:100%;max-width:520px;animation:fadeUp .2s ease;}
.modal-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;}
.modal-title{font-size:17px;font-weight:800;margin-bottom:3px;}
.modal-sub{font-size:12px;color:var(--muted);}
.modal-close{background:var(--card2);border:none;color:var(--muted);width:30px;height:30px;border-radius:4px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.modal-close:hover{color:var(--text);}
.modal-form{display:flex;flex-direction:column;gap:13px;}
.modal-actions{display:flex;gap:9px;justify-content:flex-end;margin-top:6px;}

/* SECTION */
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.section-title{font-size:15px;font-weight:800;letter-spacing:-.2px;}

/* RANKING */
.ranking-list{background:var(--card);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.rank-item{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border);transition:.1s;}
.rank-item:last-child{border-bottom:none;}
.rank-item:hover{background:var(--card2);}
.rank-num{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;}
.rn-1{background:rgba(245,158,11,.18);color:var(--yellow);}
.rn-2{background:rgba(156,163,175,.12);color:#9ca3af;}
.rn-3{background:rgba(180,100,50,.18);color:#cd7c4e;}
.rn-x{background:var(--card2);color:var(--muted);}
.rank-bar-bg{background:var(--card2);border-radius:999px;height:5px;overflow:hidden;margin-top:5px;}
.rank-bar-fill{height:100%;border-radius:999px;background:var(--brand);transition:width .5s;}
.rank-count{font-weight:900;font-size:20px;color:var(--brand);min-width:32px;text-align:right;}

/* META */
.meta-bar-bg{background:var(--card2);border-radius:999px;height:7px;overflow:hidden;}
.meta-bar-fill{height:100%;border-radius:999px;transition:width .6s;}
.fill-green{background:var(--green);}
.fill-yellow{background:var(--yellow);}
.fill-brand{background:var(--brand);}

/* CUPOM CARD */
.cupom-card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:16px;display:flex;align-items:center;gap:14px;margin-bottom:8px;cursor:pointer;transition:.12s;}
.cupom-card:hover{border-color:rgba(228,32,42,.3);}
.cupom-code{font-size:13px;font-weight:800;color:var(--brand);letter-spacing:2px;text-transform:uppercase;}
.cupom-name{font-size:13px;font-weight:600;margin-bottom:2px;}

/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:7px;pointer-events:none;}
.toast-msg{background:var(--card2);border:1px solid var(--border);border-left:3px solid var(--brand);border-radius:6px;padding:11px 16px;font-size:12px;font-weight:600;animation:slideIn .2s ease;box-shadow:0 8px 24px rgba(0,0,0,.4);}
.toast-msg.success{border-left-color:var(--green);}
.toast-msg.error{border-left-color:var(--red);}

/* TABS */
.tabs{display:flex;gap:3px;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:3px;width:fit-content;margin-bottom:18px;}
.tab{padding:7px 16px;border-radius:4px;font-size:12px;font-weight:700;cursor:pointer;color:var(--muted);transition:.12s;}
.tab.active{background:var(--brand);color:#fff;}

/* EMPTY */
.empty-state{text-align:center;padding:40px 20px;color:var(--muted);}
.empty-state .icon{font-size:36px;margin-bottom:10px;}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:40px;gap:10px;color:var(--muted);font-size:13px;}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite;}

/* CONFIRM CARD */
.confirm-card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:16px;display:flex;align-items:center;gap:14px;margin-bottom:9px;}
.confirm-name{font-size:14px;font-weight:700;margin-bottom:3px;}
.confirm-detail{font-size:11px;color:var(--muted);display:flex;flex-wrap:wrap;gap:10px;}
.confirm-actions{display:flex;gap:6px;flex-shrink:0;}

/* GRID */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:900px){.grid2{grid-template-columns:1fr;}.stat-grid{grid-template-columns:1fr 1fr;}}

/* ANIM */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
@keyframes pageEnter{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes countUp{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
@keyframes borderPulse{0%,100%{border-color:rgba(228,32,42,.3)}50%{border-color:rgba(228,32,42,.8)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 0 0 rgba(228,32,42,0)}50%{box-shadow:0 0 20px 4px rgba(228,32,42,.15)}}

/* Page transitions */
.content{animation:pageEnter .3s ease;}
.page-content{animation:pageEnter .25s ease;}

/* Stat cards animados */
.stat-card{transition:transform .2s ease, box-shadow .2s ease;}
.stat-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.3);}
.stat-value{animation:countUp .4s ease;}

/* Nav items */
.nav-item{transition:background .15s ease, color .15s ease, border-color .15s ease, transform .1s ease;}
.nav-item:hover{transform:translateX(3px);}
.nav-item.active{animation:none;}

/* Buttons */
.btn{transition:all .18s ease;position:relative;overflow:hidden;}
.btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:background .15s ease;}
.btn:hover::after{background:rgba(255,255,255,.07);}
.btn:active{transform:scale(.97);}
.btn-brand:hover{box-shadow:0 4px 16px rgba(228,32,42,.35);}

/* Table rows */
tbody tr{transition:background .1s ease;}

/* Cards */
.cupom-card{transition:border-color .15s ease, transform .15s ease, box-shadow .15s ease;}
.cupom-card:hover{transform:translateX(3px);box-shadow:0 4px 16px rgba(0,0,0,.2);}
.confirm-card{transition:border-color .15s ease, box-shadow .15s ease;}
.confirm-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.2);}
.rank-item{transition:background .1s ease, transform .15s ease;}
.rank-item:hover{transform:translateX(2px);}

/* Modal */
.modal{animation:fadeUp .2s cubic-bezier(.34,1.56,.64,1);}

/* Toast */
.toast-msg{animation:slideIn .25s cubic-bezier(.34,1.56,.64,1);}

/* Login */
#screen-login::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(228,32,42,.08) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;animation:glowPulse 4s ease infinite;}

/* Topbar */
.topbar{backdrop-filter:blur(10px);background:rgba(17,17,17,.95);}

/* Sidebar item icons */
.nav-icon{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;flex-shrink:0;}
.nav-icon svg{width:14px;height:14px;}

/* Input focus */
.field input:focus,.field select:focus,.field textarea:focus{box-shadow:0 0 0 2px rgba(228,32,42,.2);}

/* Skeleton loader */
.skeleton{background:linear-gradient(90deg,var(--card) 25%,var(--card2) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:4px;}

/* Bell btn */
.bell-btn{transition:all .15s ease;}
.bell-btn:hover{transform:scale(1.1);}

/* Lucide icons inline */
.ic{display:inline-flex;align-items:center;justify-content:center;vertical-align:middle;}
.ic svg{pointer-events:none;}

/* =============================================
   MOBILE RESPONSIVE — adicionado para celular
   Nenhuma regra existente foi alterada.
   ============================================= */

/* Botão hamburguer — visível apenas no mobile */
.mob-menu-btn{display:none;background:var(--card);border:1px solid var(--border);border-radius:4px;width:34px;height:34px;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:.15s;}
.mob-menu-btn:hover{border-color:var(--brand);}
.mob-menu-btn svg{stroke:var(--muted);}

/* Overlay escuro por trás da sidebar quando aberta no mobile */
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:149;backdrop-filter:blur(2px);}

@media(max-width:768px){

  /* ── LOGIN ── */
  .login-wrap{width:100%;padding:0 20px;}

  /* ── TOPBAR ── */
  .topbar{padding:0 14px;}
  .mob-menu-btn{display:flex;}
  /* Esconde o label de página no mobile para economizar espaço */
  #top-page-label{display:none;}
  /* Esconde o separador ao lado do logo */
  .topbar > div > div[style*="width:1px"]{display:none!important;}
  /* Esconde nome e role da pílula no mobile, deixa só avatar */
  .user-pill #top-name{display:none;}
  .user-pill .tag{display:none;}
  .user-pill{padding:4px 7px;}
  /* Esconde texto "Sair", deixa só ícone */
  .topbar .btn-ghost.btn-sm span,
  .topbar .btn-ghost.btn-sm{font-size:0;padding:0;width:34px;height:34px;justify-content:center;}
  .topbar .btn-ghost.btn-sm svg{width:15px;height:15px;}

  /* ── SIDEBAR (drawer) ── */
  .sidebar{
    position:fixed;
    top:56px;left:0;
    width:240px;
    height:calc(100vh - 56px);
    z-index:150;
    transform:translateX(-100%);
    transition:transform .25s ease;
    border-top:none;
    box-shadow:4px 0 24px rgba(0,0,0,.4);
  }
  .sidebar.mob-open{transform:translateX(0);}
  #sidebar-overlay.mob-open{display:block;}

  /* ── CONTENT ── */
  .content{padding:16px;}

  /* ── STAT GRID ── */
  .stat-grid{grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
  .stat-value{font-size:24px;}

  /* ── GRID2 ── */
  .grid2{grid-template-columns:1fr!important;}

  /* ── TABLES: scroll horizontal ── */
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  table{min-width:600px;}

  /* ── FILTER BAR ── */
  .filter-bar{flex-direction:column;align-items:stretch;}
  .filter-bar input,.filter-bar select{width:100%;min-width:0;}

  /* ── MODAL ── */
  .modal-overlay{padding:10px;}
  .modal{padding:18px;max-height:90vh;overflow-y:auto;}
  .modal-actions{flex-wrap:wrap;}
  .modal-actions .btn{flex:1;justify-content:center;min-width:100px;}

  /* ── CONFIRM CARD ── */
  .confirm-card{flex-wrap:wrap;}
  .confirm-actions{width:100%;justify-content:flex-end;margin-top:8px;}

  /* ── TABS ── */
  .tabs{width:100%;}
  .tab{flex:1;text-align:center;padding:7px 8px;}

  /* ── CUPOM CARD ── */
  .cupom-card{flex-wrap:wrap;gap:10px;}

  /* ── RANKING ── */
  .rank-count{font-size:16px;min-width:24px;}

  /* ── NOTIF PANEL ── */
  /* No mobile vira fixed centralizado para não vazar da tela */
  .notif-panel,
  #notif-panel{
    position:fixed!important;
    top:64px!important;
    left:14px!important;
    right:14px!important;
    width:auto!important;
    max-width:100%!important;
    z-index:600!important;
  }

  /* ── TOAST ── */
  #toast{bottom:12px;right:12px;left:12px;}
  .toast-msg{font-size:11px;}

  /* ── OVERLAY FULL (sorteio/premiada success) ── */
  #overlay-full{padding:12px;}

  /* ── SECTION HEAD ── */
  .section-head{flex-wrap:wrap;gap:8px;}

  /* ── FORMULÁRIOS INLINE (grids dentro de innerHTML) ── */
  /* Targets inline grids gerados por JS que usam grid-template-columns fixo */

// 
// API CLIENT
// 
async function api(method, path, body = null) {
 const headers = {'Content-Type':'application/json'}
 if (authToken) headers['Authorization'] = `Bearer ${authToken}`

 const opts = {method, headers}
 if (body && method !== 'GET') opts.body = JSON.stringify(body)

 const url = path.startsWith('http') ? path : `${API_BASE}${path}`

 try {
 const res = await fetch(url, opts)
 const data = await res.json()

 if (res.status === 401 && authToken) {
 doLogout(); showToast('Sessão expirada. Faça login novamente.', 'error'); return null
 }
 if (!res.ok) {
 showToast(data.error || 'Erro na requisição', 'error')
 return null
 }
 return data
 } catch (e) {
 showToast('Erro de conexão com o servidor', 'error')
 console.error('[API]', e)
 return null
 }
}

function loadingHTML(msg = 'Carregando...') {
 return `<div class="loading"><div class="spinner"></div> ${msg}</div>`
}

// 
// AUTENTICAÇÃO
// 
async function doLogin() {
 const email = document.getElementById('login-email').value.trim()
 const senha = document.getElementById('login-pass').value
 if (!email || !senha) { showLoginError('Preencha login e senha'); return }

 const btn = document.getElementById('btn-login')
 btn.textContent = 'Aguarde...'; btn.disabled = true

 const data = await api('POST', '/api/auth/login', {login: email, senha})
 btn.textContent = 'ACESSAR '; btn.disabled = false

 if (!data) return

 authToken = data.token
 currentUser = data.colaborador
 sessionStorage.setItem('inovar_token', authToken)
 sessionStorage.setItem('inovar_user', JSON.stringify(currentUser))

 bootstrapShell()
}

function bootstrapShell() {
 document.getElementById('screen-login').style.display = 'none'
 document.getElementById('shell').style.display = 'flex'
 document.getElementById('top-name').textContent = currentUser.nome.split(' ')[0]
 document.getElementById('top-avatar').textContent = currentUser.avatar
 document.getElementById('top-role').textContent = PERFIS[currentUser.perfil]?.label.split('/')[0] || currentUser.perfil

 const isAdmin = ADMIN_PERFIS.includes(currentUser.perfil)
 if (isAdmin) document.getElementById('bell-wrap').style.display = 'block'

 applyTheme()
 renderSidebar()
 updateBell()
 navigate(isAdmin ? 'adm-dashboard' : 'v-dashboard')
}

function doLogout() {
 authToken = null; currentUser = null
 sessionStorage.removeItem('inovar_token')
 sessionStorage.removeItem('inovar_user')
 document.getElementById('shell').style.display = 'none'
 document.getElementById('screen-login').style.display = 'flex'
 document.getElementById('login-pass').value = ''
}

function showLoginError(msg) {
 const el = document.getElementById('login-error')

async function doCadastro() {
 const nome=document.getElementById('cad-nome')?.value.trim()
 const login=document.getElementById('cad-login')?.value.trim()
 const whatsapp=document.getElementById('cad-whatsapp')?.value.trim()
 const senha=document.getElementById('cad-senha')?.value
 const errEl=document.getElementById('cad-error')
 const succEl=document.getElementById('cad-success')
 const btn=document.getElementById('btn-cadastro')
 errEl.style.display='none'; succEl.style.display='none'
 if(!nome){errEl.textContent='Informe seu nome';errEl.style.display='block';return}
 if(!login){errEl.textContent='Informe seu e-mail';errEl.style.display='block';return}
 if(!whatsapp){errEl.textContent='Informe seu WhatsApp';errEl.style.display='block';return}
 if(!senha||senha.length<6){errEl.textContent='Senha mínimo 6 caracteres';errEl.style.display='block';return}
 btn.textContent='Aguarde...'; btn.disabled=true
 const data=await api('POST','/api/auth/register',{nome,login,senha,whatsapp})
 btn.textContent='SOLICITAR ACESSO'; btn.disabled=false
 if(!data) return
 succEl.textContent='Solicitação enviada! Aguarde a aprovação do gestor.'
 succEl.style.display='block'
 ;['cad-nome','cad-login','cad-whatsapp','cad-senha'].forEach(id=>document.getElementById(id).value='')
 setTimeout(()=>showLogin(),4000)
}

// 
// HELPERS

function mesLabel(m) {
 if (!m) return '—'
 const [y, mo] = m.split('-')
 return ['','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][+mo] + '/' + y
}
function formatDate(d) {
 if (!d) return '—'
 const dt = new Date(d)
 return `${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}/${dt.getFullYear()}`
}
function mascaraTel(el) {
 let v = el.value.replace(/\D/g,'').substring(0,11)
 if (v.length > 10) v = `(${v.substring(0,2)}) ${v.substring(2,7)}-${v.substring(7)}`
 else if (v.length > 6) v = `(${v.substring(0,2)}) ${v.substring(2,6)}-${v.substring(6)}`
 else if (v.length > 2) v = `(${v.substring(0,2)}) ${v.substring(2)}`
 el.value = v
}
function mascaraPlaca(el) {
 let v = el.value.toUpperCase().replace(/[^A-Z0-9]/g,'')
 if (v.length > 3) v = v.substring(0,3) + '-' + v.substring(3,7)
 el.value = v
}

function mesSelectHTML(onChange = `filterMes=this.value;navigate(currentPage)`) {
 return `<select onchange="${onChange}" style="background:var(--card);border:1.5px solid var(--border);border-radius:4px;padding:8px 12px;color:var(--text);font-family:'Montserrat',sans-serif;font-size:12px;">
 ${MESES_ANO.map(m => `<option value="${m}" ${m===filterMes?'selected':''}>${mesLabel(m)}</option>`).join('')}
 </select>`
}

function inputStyle(extra='') {
 return `style="width:100%;background:var(--card2);border:1.5px solid var(--border);border-radius:4px;padding:10px 12px;color:var(--text);font-family:'Montserrat',sans-serif;font-size:12px;transition:.2s;${extra}"`
}

function statusTag(status) {
 const map = {
 aprovado: ['tag-green','Aprovado'],
 aguard_aprovacao: ['tag-yellow','Aguardando'],
 reprovado: ['tag-red','Reprovado'],
 validado: ['tag-green','Validado'],
 aguardando: ['tag-yellow','Aguardando'],
 }
 const [cls, label] = map[status] || ['tag-yellow', status]
 return `<span class="tag ${cls}">${label}</span>`
}

async function updateBell() {
 if (!ADMIN_PERFIS.includes(currentUser?.perfil)) return
 const [data, collabData] = await Promise.all([
 api('GET', `/api/dashboard?mes=${filterMes}`),
 api('GET', '/api/colaboradores?status=pendente'),
 ])
 if (!data) return
 const nCupons   = Number(data.totais?.aguardando||0)
 const nInds     = Number(data.indicacoes?.aguardando||0)
 const nAcesso   = collabData?.colaboradores?.length || 0
 const total     = nCupons + nInds + nAcesso
 // Salva globalmente para uso no painel de notificações
 window._bellCounts = { nCupons, nInds, nAcesso, total }
 const badge = document.getElementById('bell-count')
 if (badge) {
 badge.textContent = total
 badge.classList.toggle('hidden', total === 0)
 // Anima badge quando muda
 if (total > 0) { badge.style.animation='none'; setTimeout(()=>badge.style.animation='',10) }
 }
}

function toggleNotif() {
 const panel = document.getElementById('notif-panel')
 if (!panel) return
 if (panel.classList.contains('hidden')) {
 panel.classList.remove('hidden')
 // Mostra overlay no mobile
 const isMob = window.innerWidth <= 768
 const notifOv = document.getElementById('notif-overlay')
 if (isMob && notifOv) notifOv.style.display = 'block'
 const c = window._bellCounts || {nCupons:0, nInds:0, nAcesso:0, total:0}
 const item = (svg, label, count, page, color) => count > 0
 ? `<div class="notif-item" onclick="closeNotif();navigate('${page}')" style="display:flex;align-items:center;gap:10px;">
 <span style="width:28px;height:28px;border-radius:6px;background:${color}18;display:flex;align-items:center;justify-content:center;color:${color};flex-shrink:0;">${svg}</span>
 <span style="flex:1;font-size:12px;">${label}</span>
 <span style="background:${color};color:#fff;border-radius:999px;font-size:10px;font-weight:800;padding:2px 7px;min-width:20px;text-align:center;">${count}</span>
 </div>` : ''
 const items = [
 item('<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z\"/></svg>', 'Cupons aguardando aprovação', c.nCupons, 'adm-confirmacao', 'var(--yellow)'),
 item('<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"8\" r=\"6\"/><path d=\"M15.477 12.89 17 22l-5-3-5 3 1.523-9.11\"/></svg>', 'Indicações para validar', c.nInds, 'adm-premiadas', 'var(--blue)'),
 item('<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"7.5\" cy=\"15.5\" r=\"5.5\"/><path d=\"m21 2-9.6 9.6\"/><path d=\"m15.5 7.5 3 3L22 7l-3-3\"/></svg>', 'Solicitações de acesso', c.nAcesso, 'adm-usuarios', 'var(--green)'),
 ].filter(Boolean).join('')
 panel.innerHTML = `
 <div style="padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
 <span style="font-weight:800;font-size:13px;">Notificações</span>
 ${c.total > 0 ? `<span style="background:var(--brand);color:#fff;border-radius:999px;font-size:10px;font-weight:800;padding:2px 8px;">${c.total} pendente${c.total>1?'s':''}</span>` : ''}
 </div>
 ${items || '<div style="padding:16px 14px;font-size:12px;color:var(--muted);text-align:center;">Nenhuma pendência</div>'}
 `
 document.addEventListener('click', closeNotifOutside)
 } else {
 closeNotif()
 }
}

function closeNotif() {
 document.getElementById('notif-panel')?.classList.add('hidden')
 const notifOv = document.getElementById('notif-overlay')
 if (notifOv) notifOv.style.display = 'none'
 document.removeEventListener('click', closeNotifOutside)
}

function closeNotifOutside(e) {
 const wrap = document.getElementById('bell-wrap')
 const notifOv = document.getElementById('notif-overlay')
 // Se clicou no overlay de notif, já fechou via onclick — ignora aqui
 if (notifOv && notifOv.contains(e.target)) return
 if (wrap && !wrap.contains(e.target)) {
 closeNotif()
 }
}

async function exportarCSV() {
 const data = await api('GET', `/api/cupons?mes=${filterMes}&limit=1000`)
 if (!data?.cupons?.length) { showToast('Nenhum dado para exportar', ''); return }
 const headers = ['Codigo','Cliente','Telefone','Placa','Origem','Consultor','Data','Status']
 const rows = data.cupons.map(c => [c.codigo,c.cliente_nome,c.cliente_tel,c.placa||'',c.origem||'',c.vendedor_nome||'',c.criado_em?.split('T')[0]||'',c.status].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(','))
 const csv = [headers.join(','),...rows].join('\n')
 const a = document.createElement('a')
 a.href = URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}))
 a.download = `inovar-cupons-${filterMes}.csv`; a.click()
 showToast(` CSV exportado — ${data.cupons.length} registros`, 'success')
}

const ORIGEM_COLORS = ['#E4202A','#3b82f6','#22c55e','#f59e0b','#8b5cf6','#06b6d4','#ec4899','#64748b','#f97316','#10b981']

function origemIconSVG(iconKey, color, size=20) {
  const path = ORIGEM_ICONS[iconKey]
  if (!path) return `<span style="width:${size}px;height:${size}px;display:inline-flex;"></span>`
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color||'currentColor'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${path}</svg>`
}

function renderOrigemIcon(icone, size=20) {
  try {
    const parsed = JSON.parse(icone)
    return origemIconSVG(parsed.key, parsed.color, size)
  } catch {
    return icone ? `<span style="font-size:${size}px;line-height:1;">${icone}</span>` : ''
  }
}

function selectOrigemIcon(key) {
  window._origemIconKey = key
  // Reset todos
  document.querySelectorAll('[id^="icon-opt-"]').forEach(b => {
    b.style.borderColor = 'var(--border)'
    b.style.background  = 'var(--card2)'
  })
  // Ativa selecionado
  const btn = document.getElementById('icon-opt-' + key)
  if (btn) {
    btn.style.borderColor = window._origemIconColor || '#E4202A'
    btn.style.background  = 'rgba(228,32,42,.1)'
  }
  updateOrigemPreview()
}

function selectOrigemColor(color) {
  window._origemIconColor = color
  // Reset todos
  document.querySelectorAll('[id^="color-opt-"]').forEach(b => {
    b.style.border = '2px solid transparent'
    b.style.transform = 'scale(1)'
  })
  const id = 'color-opt-' + color.replace('#','')
  const btn = document.getElementById(id)
  if (btn) {
    btn.style.border = '2px solid var(--text)'
    btn.style.transform = 'scale(1.2)'
  }
  // Atualiza borda do ícone selecionado
  if (window._origemIconKey) {
    const iconBtn = document.getElementById('icon-opt-' + window._origemIconKey)
    if (iconBtn) iconBtn.style.borderColor = color
  }
  updateOrigemPreview()
}

function updateOrigemPreview() {
  const key   = window._origemIconKey   || 'tag'
  const color = window._origemIconColor || '#E4202A'
  const prev  = document.getElementById('fo-preview')
  if (prev) {
    prev.style.background = color + '18'
    prev.innerHTML = origemIconSVG(key, color, 22)
  }
}

function abrirNovaOrigem() {
  document.getElementById('nova-origem-form')?.classList.remove('hidden')
  document.getElementById('fo-nome')?.focus()
}

async function salvarOrigem() {
  const nome  = document.getElementById('fo-nome')?.value.trim()
  const key   = window._origemIconKey   || 'tag'
  const color = window._origemIconColor || '#E4202A'
  const icone = JSON.stringify({key, color})
  if (!nome) { showToast('Informe o nome','error'); return }
  const data = await api('POST', '/api/origens', {nome, icone})
  if (!data) return
  showToast('Origem criada com sucesso', 'success')
  navigate('adm-origens')
}

async function toggleOrigem(id, ativo) {
  const data = await api('PUT', '/api/origens', {id, ativo})
  if (!data) return
  showToast(ativo ? 'Origem ativada' : 'Origem desativada', 'success')
  navigate('adm-origens')
}

async function excluirOrigem(id) {
  const data = await api('DELETE', `/api/origens?id=${id}`)
  if (!data) return
  showToast('Origem removida', '')
  navigate('adm-origens')
}

async function salvarColaborador(id) {
 const nome = document.getElementById('mc-nome')?.value.trim()
 const login = document.getElementById('mc-login')?.value.trim()
 const senha = document.getElementById('mc-senha')?.value
 const perfil = document.getElementById('mc-perfil')?.value
 const meta = parseInt(document.getElementById('mc-meta')?.value)||0
 const avatar = (document.getElementById('mc-avatar')?.value || nome?.[0] || '?').toUpperCase().charAt(0)

 if (!nome) { showToast('Informe o nome','error'); return }
 if (!login) { showToast('Informe o login','error'); return }

 const whatsapp = document.getElementById('mc-whatsapp')?.value.trim() || ''
 let data
 if (id && id !== 'null') {
 data = await api('PUT', '/api/colaboradores', {id, nome, login, senha: senha||undefined, perfil, meta, avatar, whatsapp})
 } else {
 if (!senha || senha.length < 6) { showToast('Senha mínimo 6 caracteres','error'); return }
 data = await api('POST', '/api/colaboradores', {nome, login, senha, perfil, meta, avatar, whatsapp})
 }
 if (!data) return
 closeModal()
 showToast(` ${nome} ${id&&id!=='null'?'atualizado':'criado'}`, 'success')
 navigate('adm-usuarios')
}

async function salvarConfig(tab) {
 const g = id => document.getElementById(`cfg-${id}`)?.value
 const updates = {}

 if (tab==='empresa') {
 if (g('emp-nome')) updates.empresa_nome = g('emp-nome')
 if (g('emp-cnpj')) updates.empresa_cnpj = g('emp-cnpj')
 if (g('emp-tel')) updates.empresa_telefone = g('emp-tel')
 if (g('emp-email')) updates.empresa_email = g('emp-email')
 } else if (tab==='cupom') {
 if (g('cup-prefixo')) updates.cupom_prefixo = g('cup-prefixo')
 if (g('cup-delay')) updates.cupom_delay_envio = g('cup-delay')
 if (g('cup-validade'))updates.cupom_validade_dias = g('cup-validade')
 if (g('cup-msg')) updates.cupom_mensagem = g('cup-msg')
 if (g('cup-rodape')) updates.cupom_rodape = g('cup-rodape')
 if (g('cup-imgurl')) updates.cupom_imagem_url = g('cup-imgurl')
 } else if (tab==='jornada') {
 if (g('f1d')) updates.jornada_followup1_dias = g('f1d')
 if (g('f1m')) updates.jornada_followup1_msg = g('f1m')
 if (g('f2d')) updates.jornada_followup2_dias = g('f2d')
 if (g('f2m')) updates.jornada_followup2_msg = g('f2m')
 if (g('conf')) updates.jornada_msg_confirmacao = g('conf')
 if (g('repr')) updates.jornada_msg_reprovacao = g('repr')
 } else if (tab==='sorteio') {
  for (let i = 1; i <= (window._sorteioCount || 1); i++) {
    const el = document.getElementById(`sorteio-bloco-${i}`)
    if (!el) continue
    const g = id => document.getElementById(id)?.value
    if (g(`sort-${i}-nome`))   updates[`sorteio_${i}_nome`]   = g(`sort-${i}-nome`)
    if (g(`sort-${i}-premio`)) updates[`sorteio_${i}_premio`] = g(`sort-${i}-premio`)
    if (g(`sort-${i}-ini`))    updates[`sorteio_${i}_inicio`] = g(`sort-${i}-ini`)
    if (g(`sort-${i}-fim`))    updates[`sorteio_${i}_fim`]    = g(`sort-${i}-fim`)
  }
}

 if (tab==='acesso') {
 const v = document.getElementById('cfg-msg-acesso')?.value
 if (v) updates.msg_aprovacao_acesso = v
 }
 if (!Object.keys(updates).length) { showToast('Nada para salvar',''); return }
 const data = await api('POST', '/api/config', updates)
 if (data) showToast(' Configurações salvas!', 'success')
}

 INDICADO ${n} ${n===1?'<span style="color:var(--brand);">*</span>':'<span style="color:var(--muted);font-weight:400;">(opcional)</span>'}
 </div>
 <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
 <div class="field" style="margin:0;"><label>Nome</label><input type="text" id="ip-nom-${n}" placeholder="Nome" ${inputStyle()}></div>
 <div class="field" style="margin:0;"><label>WhatsApp</label><input type="tel" id="ip-tel-${n}" placeholder="(47) 99999-9999" oninput="mascaraTel(this)" ${inputStyle()}></div>
 </div>
 </div>`).join('')}
 </div>

 <div class="field" style="margin-bottom:16px;"><label>Observação (opcional)</label><input type="text" id="ip-obs" placeholder="Evento, campanha..." ${inputStyle()}></div>
 <button class="btn btn-brand" id="btn-prem-enviar" style="width:100%;justify-content:center;padding:14px;font-size:14px;" onclick="enviarPremiada()"> Registrar Indicação Premiada</button>
 </div>`
}

async function enviarPremiada() {
 const indNome = document.getElementById('ip-ind-nome')?.value.trim()
 const indPlaca = document.getElementById('ip-ind-placa')?.value.trim().toUpperCase()
 const indTel = document.getElementById('ip-ind-tel')?.value.trim()
 const nom1 = document.getElementById('ip-nom-1')?.value.trim()
 const tel1 = document.getElementById('ip-tel-1')?.value.trim()
 const obs = document.getElementById('ip-obs')?.value.trim()

 if (!indNome) { showToast('Informe o nome do indicador','error'); return }
 if (!indPlaca) { showToast('Informe a placa','error'); return }
 if (!indTel) { showToast('Informe o WhatsApp','error'); return }
 if (!nom1||!tel1) { showToast('Preencha ao menos o Indicado 1','error'); return }

 const indicados = []
 for (let n=1;n<=3;n++) {
 const nm = document.getElementById(`ip-nom-${n}`)?.value.trim()
 const tl = document.getElementById(`ip-tel-${n}`)?.value.trim()
 if (nm && tl) indicados.push({nome:nm, tel:tl})
 }

 const btn = document.getElementById('btn-prem-enviar')
 if (btn) { btn.disabled=true; btn.textContent=' Registrando...' }

 const data = await api('POST', '/api/indicacoes', {
 vendedorId: currentUser.id, indNome, indPlaca, indTel, indicados, obs
 })

 if (btn) { btn.disabled=false; btn.textContent=' Registrar Indicação Premiada' }
 if (!data) return

 showPremiadaOverlay(data.codigo, indNome, indPlaca, indTel, indicados)
}

function showPremiadaOverlay(codigo, indNome, indPlaca, indTel, indicados) {
 const overlay = document.getElementById('overlay-full')
 overlay.classList.remove('hidden')
 overlay.innerHTML = `
 <div style="background:var(--card);border:1px solid var(--border);border-top:3px solid var(--green);border-radius:10px;padding:36px;max-width:500px;width:100%;text-align:center;animation:fadeUp .3s ease;">
 <div style="width:72px;height:72px;border-radius:50%;background:rgba(34,197,94,.12);border:2px solid rgba(34,197,94,.25);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;color:var(--green);animation:pulse 1.5s infinite;"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
 <div style="font-size:20px;font-weight:900;color:var(--green);margin-bottom:5px;">Indicação Registrada!</div>
 <div style="font-size:12px;color:var(--muted);margin-bottom:18px;">O admin será notificado para validar</div>
 <div style="background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.15);border-radius:6px;padding:12px 14px;margin-bottom:16px;text-align:left;font-size:12px;">
 <b style="color:var(--red);">Cobrança gerada:</b> R$ 1,00 na sua próxima fatura (${codigo}).
 </div>
 <div style="background:var(--card2);border-radius:6px;padding:12px;margin-bottom:18px;text-align:left;">
 <div style="font-size:10px;color:var(--yellow);font-weight:700;margin-bottom:6px;">INDICADOR</div>
 <div style="font-size:13px;font-weight:700;">${indNome}</div>
 <div style="font-size:11px;color:var(--muted);"> ${indPlaca} · ${indTel}</div>
 <div style="margin-top:8px;font-size:10px;color:var(--green);font-weight:700;margin-bottom:5px;">INDICADOS</div>
 ${indicados.map((p,i) => `<div style="font-size:11px;">${i+1}. ${p.nome} · ${p.tel}</div>`).join('')}
 </div>
 <div style="display:flex;gap:8px;">
 <button class="btn btn-ghost" style="flex:1;justify-content:center;" onclick="document.getElementById('overlay-full').classList.add('hidden');navigate('v-premiada')"> Nova</button>
 <button class="btn btn-brand" style="flex:1;justify-content:center;" onclick="document.getElementById('overlay-full').classList.add('hidden');navigate('v-movimentos')">Ver Movimentos </button>
 </div>
 </div>`
}

// 
// VENDEDOR — MOVIMENTOS
// 
async function pageVMovimentos() {
 const el = document.getElementById('content-area')
 el.innerHTML = loadingHTML()

 const activeTab = window._movTab || 'sorteios'

 const [cuponsData, indData] = await Promise.all([
 api('GET', `/api/cupons?vendedor_id=${currentUser.id}&mes=${filterMes}&limit=200`),
 api('GET', `/api/indicacoes?vendedor_id=${currentUser.id}&mes=${filterMes}`),
 ])

 const cupons = cuponsData?.cupons || []

 el.innerHTML = `

 <div style="display:flex;gap:8px;">
 ${mesSelectHTML(`filterMes=this.value;window._movTab=window._movTab||'sorteios';pageVMovimentos()`)}

 <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;">
 <div style="background:var(--card);border:1px solid var(--border);border-radius:6px;padding:12px;text-align:center;">
 <div style="font-size:10px;color:var(--muted);font-weight:700;margin-bottom:3px;">SORTEIOS</div>
 <div style="font-size:22px;font-weight:900;color:var(--brand);">${cupons.length}</div>
 </div>
 <div style="background:var(--card);border:1px solid var(--border);border-radius:6px;padding:12px;text-align:center;">
 <div style="font-size:10px;color:var(--muted);font-weight:700;margin-bottom:3px;">APROVADOS</div>
 <div style="font-size:22px;font-weight:900;color:var(--green);">${aprovados}</div>
 </div>
 <div style="background:var(--card);border:1px solid var(--border);border-radius:6px;padding:12px;text-align:center;">
 <div style="font-size:10px;color:var(--muted);font-weight:700;margin-bottom:3px;">AG. APROVAÇÃO</div>
 <div style="font-size:22px;font-weight:900;color:var(--yellow);">${agAprov}</div>
 </div>
 <div style="background:var(--card);border:1px solid var(--border);border-radius:6px;padding:12px;text-align:center;">
 <div style="font-size:10px;color:var(--muted);font-weight:700;margin-bottom:3px;">IND. PREMIADAS</div>
 <div style="font-size:22px;font-weight:900;color:var(--yellow);">${inds.length}</div>
 </div>
 </div>

 <div class="tabs">
 <div class="tab ${activeTab==='sorteios'?'active':''}" onclick="window._movTab='sorteios';pageVMovimentos()"> Sorteios (${cupons.length})</div>
 <div class="tab ${activeTab==='premiadas'?'active':''}" onclick="window._movTab='premiadas';pageVMovimentos()"> Ind. Premiadas (${inds.length})</div>
 </div>

 ${activeTab==='sorteios' ? `
 ${cupons.length ? cupons.map(c => cupomCardHTML(c)).join('') : '<div class="empty-state"><div class="icon"></div><p>Nenhum sorteio este mês</p></div>'}
 ` : `
 ${inds.length ? inds.map(i => `
 <div style="background:var(--card);border:1px solid var(--border);border-radius:6px;padding:14px;margin-bottom:8px;cursor:pointer;" onclick="">
 <div style="display:flex;align-items:center;gap:10px;">
 <span style="font-size:18px;"></span>
 <div style="flex:1;">
 <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;">
 <b style="color:var(--yellow);font-size:11px;">${i.codigo}</b>
 ${statusTag(i.status)}
 </div>
 <div style="font-size:13px;font-weight:700;">${i.ind_nome}</div>
 <div style="font-size:11px;color:var(--muted);"> ${i.ind_placa} · ${i.indicados?.length||0} indicado(s)</div>
 </div>
 <div style="font-size:11px;color:var(--muted);">${formatDate(i.criado_em)}</div>
 </div>
 </div>`).join('') : '<div class="empty-state"><div class="icon"></div><p>Nenhuma indicação premiada este mês</p></div>'}
 `}`
}

// 
// MODAL / TOAST
// 
function openModal(html) {
 document.getElementById('modal-box').innerHTML = html
 document.getElementById('modal-overlay').classList.remove('hidden')
}

function closeModal(e) {
 if (!e || e.target === document.getElementById('modal-overlay')) {
 document.getElementById('modal-overlay').classList.add('hidden')
 }
}

function showToast(msg, type = '') {
 const el = document.createElement('div')
 el.className = `toast-msg ${type}`
 el.textContent = msg
 document.getElementById('toast').appendChild(el)
 setTimeout(() => el.remove(), 3800)
}

// ── MOBILE SIDEBAR TOGGLE ──
function toggleMobileSidebar() {
 const sidebar = document.getElementById('sidebar')
 const overlay = document.getElementById('sidebar-overlay')
 if (!sidebar || !overlay) return
 const isOpen = sidebar.classList.contains('mob-open')
 if (isOpen) {
  sidebar.classList.remove('mob-open')
  overlay.classList.remove('mob-open')
 } else {
  sidebar.classList.add('mob-open')
  overlay.classList.add('mob-open')
 }
}

function closeMobileSidebar() {
 const sidebar = document.getElementById('sidebar')
 const overlay = document.getElementById('sidebar-overlay')
 if (!sidebar || !overlay) return
 sidebar.classList.remove('mob-open')
 overlay.classList.remove('mob-open')
}

// Fecha sidebar ao navegar no mobile
const _origNavigate = navigate
window.navigate = function(page) {
 closeMobileSidebar()
 _origNavigate(page)
}
</script>
